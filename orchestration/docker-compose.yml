x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Cosmos runs each dbt task from its own isolated temp copy of the project,
    # so a relative duckdb path would resolve to a different, empty database
    # per task. Pinning an absolute path here keeps every task pointed at the
    # same file, matching what a real warehouse connection would provide.
    DBT_DUCKDB_PATH: /opt/airflow/dbt/wknd_dbt_project/data/wknd_airflow.duckdb
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-dbt-target:/opt/airflow/dbt/wknd_dbt_project/target
    - ../dbt_project.yml:/opt/airflow/dbt/wknd_dbt_project/dbt_project.yml
    - ../profiles.yml:/opt/airflow/dbt/wknd_dbt_project/profiles.yml
    - ../packages.yml:/opt/airflow/dbt/wknd_dbt_project/packages.yml
    - ../package-lock.yml:/opt/airflow/dbt/wknd_dbt_project/package-lock.yml
    - ../models:/opt/airflow/dbt/wknd_dbt_project/models
    - ../seeds:/opt/airflow/dbt/wknd_dbt_project/seeds
    - ../macros:/opt/airflow/dbt/wknd_dbt_project/macros
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
        /opt/airflow/dbt_venv/bin/dbt deps --project-dir /opt/airflow/dbt/wknd_dbt_project --profiles-dir /opt/airflow/dbt/wknd_dbt_project
        /opt/airflow/dbt_venv/bin/dbt parse --project-dir /opt/airflow/dbt/wknd_dbt_project --profiles-dir /opt/airflow/dbt/wknd_dbt_project --profile wknd_analytics --target dev
    depends_on: *airflow-common-depends-on

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

volumes:
  postgres-db-volume:
  airflow-logs:
  airflow-dbt-target:
