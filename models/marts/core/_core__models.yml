version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
  
  - name: dim_adventures
    columns:
      - name: adventure_id
        data_tests:
          - unique
          - not_null
  
  - name: fct_bookings
    columns:
      - name: booking_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: adventure_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_adventures')
                field: adventure_id
