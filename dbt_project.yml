name: 'wknd_analytics'
version: '1.0.0'
config-version: 2
profile: 'wknd_analytics'

model-paths: ['models']
seed-paths: ['seeds']
test-paths: ['tests']
macro-paths: ['macros']
analysis-paths: ['analyses']
clean-targets: ['target', 'dbt_packages']

models:
  wknd_analytics:
    staging:
      +materialized: 'view'
      +schema: 'staging'
    intermediate:
      +materialized: 'ephemeral'
    marts:
      +materialized: 'table'
      +schema: 'marts'

seeds:
  wknd_analytics:
    +schema: raw
